<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nyx Nexus - Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* Global Stars BG purely for visual match */
        .stars-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .stars-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(120, 40, 200, 0.12) 0%, transparent 65%),
                radial-gradient(ellipse 60% 50% at 0% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 85% 65% at 50% 55%, rgba(139, 69, 19, 0.25) 0%, rgba(184, 134, 11, 0.12) 42%, transparent 78%),
                radial-gradient(ellipse 50% 40% at 100% 60%, rgba(249, 115, 22, 0.05) 0%, transparent 55%);
        }

        .login-wrapper {
            border-radius: 16px;
            padding: 1.5px;
            background: linear-gradient(135deg, #00e1ff, #8a5cff, #ffd54a);
            background-size: 200% 200%;
            box-shadow:
                0 0 12px rgba(0, 225, 255, 0.4),
                0 0 18px rgba(138, 92, 255, 0.35),
                0 0 20px rgba(255, 213, 74, 0.35);
            animation: borderShift 6s linear infinite, float 6s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        .login-container {
            background: rgba(22, 16, 44, 0.85);
            backdrop-filter: blur(12px);
            width: 380px;
            padding: 30px;
            border-radius: 14px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        @keyframes borderShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(-8px);
            }

            50% {
                transform: translateY(8px);
            }

            100% {
                transform: translateY(-8px);
            }
        }

        .shooting-stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            filter: drop-shadow(0 0 8px white) drop-shadow(0 0 15px cyan);
            opacity: 0;
            animation: shootingStar 2s linear infinite;
        }

        .shooting-star:nth-child(1) {
            top: -50px;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 1.5s;
        }

        .shooting-star:nth-child(2) {
            top: -20px;
            left: 20%;
            animation-delay: 2s;
            animation-duration: 2s;
        }

        .shooting-star:nth-child(3) {
            top: -80px;
            left: 35%;
            animation-delay: 3.5s;
            animation-duration: 1.8s;
        }

        .shooting-star:nth-child(4) {
            top: -30px;
            left: 50%;
            animation-delay: 1.2s;
            animation-duration: 1.7s;
        }

        .shooting-star:nth-child(5) {
            top: -100px;
            left: 70%;
            animation-delay: 4.1s;
            animation-duration: 2.2s;
        }

        .shooting-star:nth-child(6) {
            top: -40px;
            left: 85%;
            animation-delay: 1.8s;
            animation-duration: 1.9s;
        }

        .shooting-star:nth-child(7) {
            top: -90px;
            left: 15%;
            animation-delay: 2.8s;
            animation-duration: 2.1s;
        }

        .shooting-star:nth-child(8) {
            top: -10px;
            left: 95%;
            animation-delay: 0.5s;
            animation-duration: 1.6s;
        }

        @keyframes shootingStar {
            0% {
                transform: translateX(0) translateY(0) rotate(135deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateX(800px) translateY(800px) rotate(135deg);
                opacity: 0;
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #06b6d4;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ef4444;
            margin-top: 15px;
            font-size: 15px;
            font-weight: 600;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>

    <div class="stars-bg"></div>

    <div class="shooting-stars">
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <h1>NYX NEXUS</h1>
            <p>Enter the Digital Realm</p>

            <div class="input-group">
                <input type="text" id="username" placeholder="Enter Username" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <button class="login-btn" onclick="handleLogin()">Login</button>
            <div class="error-msg" id="errorMsg">Invalid credentials. Try again.</div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;
            const error = document.getElementById("errorMsg");

            if ((user === "admin" && pass === "cyber123") || (user === "demo" && pass === "demo123")) {
                localStorage.setItem("cyberLoggedIn", "true");
                window.location.href = "cyberspace.html";
            } else {
                error.style.opacity = "1";
                setTimeout(() => { error.style.opacity = "0"; }, 3000);
            }
        }

        document.getElementById("password").addEventListener("keypress", function (e) {
            if (e.key === "Enter") handleLogin();
        });

        document.getElementById("username").addEventListener("keypress", function (e) {
            if (e.key === "Enter") document.getElementById("password").focus();
        });
    </script>
</body>

</html>
