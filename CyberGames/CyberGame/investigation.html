<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Detective – Investigation</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="investigation.css">
</head>

<body class="investigation-mode">

    <canvas id="cyberStarsCanvas"
        style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

    <div id="app-container" style="position:relative;z-index:1;">

        <!-- ── HEADER ── -->
        <header class="inv-header">
            <div class="inv-header-left">
                <a href="index.html" class="back-btn">
                    <i data-lucide="chevron-left" class="icon-small"></i> Back
                </a>
                <div class="inv-title">
                    <h4>🕵️ Threat Detective</h4>
                    <h1>Season 1 – Inside the Breach</h1>
                    <h2 id="ep-title">Loading…</h2>
                </div>
            </div>
            <div class="inv-header-right" style="display:flex;align-items:center;gap:1rem;">
                <button id="fullscreen-toggle" class="btn btn-secondary tooltip-container"
                    data-tooltip="Toggle Fullscreen" style="border-radius:4px;padding:.5rem;">
                    <i data-lucide="maximize" class="icon-small"></i>
                </button>
                <div class="timer">TIME REMAINING: <span id="timer-display">00:10:00</span></div>
            </div>
        </header>

        <!-- ── CASE BRIEFING BANNER ── -->
        <div id="briefing-banner"
            style="background:rgba(0,240,255,.07);border-bottom:1px solid rgba(0,240,255,.2);padding:.8rem 2rem;font-family:'Fira Code',monospace;font-size:.85rem;color:#a0c0d0;">
        </div>

        <!-- ── WORKSPACE ── -->
        <div class="inv-workspace">

            <!-- LEFT: Evidence -->
            <aside class="panel evidence-panel">
                <div class="panel-header">
                    <h3><i data-lucide="folder-search"></i> Evidence Logs</h3>
                </div>
                <div class="evidence-list" id="evidence-list"></div>
            </aside>

            <!-- CENTER: Board -->
            <main class="panel board-panel">
                <div class="panel-header">
                    <h3><i data-lucide="git-branch"></i> Investigation Board</h3>
                    <span class="instruction">Drag evidence cards here to analyze</span>
                </div>
                <div class="board-area" id="dropzone">
                    <div class="board-grid" id="board-grid"></div>
                    <div class="drop-target-area" id="drop-placeholder">
                        <i data-lucide="plus-circle" class="drop-icon"></i>
                        <p>Drop evidence here to analyze</p>
                    </div>
                </div>
            </main>

            <!-- RIGHT: Suspects -->
            <aside class="panel suspects-panel">
                <div class="panel-header">
                    <h3><i data-lucide="users"></i> Suspects</h3>
                </div>
                <div class="suspects-list" id="suspects-list"></div>
            </aside>
        </div>

        <!-- ── ACTION FOOTER ── -->
        <footer class="panel actions-panel">
            <div class="action-group">
                <label>1. Identify Threat Type</label>
                <select id="attack-type" class="cyber-select">
                    <option value="">-- Select Threat Type --</option>
                </select>
            </div>
            <div class="action-group" id="entry-point-group">
                <label>2. Select Entry Point</label>
                <select id="entry-point" class="cyber-select">
                    <option value="">-- Select Entry Point --</option>
                </select>
            </div>
            <div class="action-group">
                <label id="suspect-label">3. Responsible Account</label>
                <select id="compromised-account" class="cyber-select">
                    <option value="">-- Select Account --</option>
                </select>
            </div>
            <div class="action-group container-actions">
                <label>4. Containment Actions</label>
                <div class="checkbox-grid" id="checkbox-grid"></div>
            </div>
            <div class="submit-action">
                <button id="submit-investigation" class="btn btn-primary cyber-btn-lg">
                    <i data-lucide="shield-check"></i> Submit Report
                </button>
            </div>
        </footer>

        <!-- ── RESULT MODAL ── -->
        <div id="result-modal" class="modal-overlay hidden">
            <div class="modal-content" id="modal-content">
                <h2 id="result-title">Investigation Complete</h2>
                <div class="result-details" id="result-text"></div>
                <button id="close-modal" class="btn btn-secondary mt-1">Return to Dashboard</button>
            </div>
        </div>

        <!-- ── XP TOAST CONTAINER ── -->
        <div id="notification-container"
            style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:9999;">
        </div>

    </div><!-- /app-container -->

    <!-- ═══════════════════════════════════════════════════════════
     INLINE GAME LOGIC  (no ES modules – works from file://)
════════════════════════════════════════════════════════════════ -->
    <script>
        // ── EPISODE DATA ────────────────────────────────────────────────
        const EPISODE_DATA = {
            "1": {
                id: "1",
                title: "The Midnight Invoice",
                briefing: "⚠ CASE BRIEFING: FinTrust Pvt Ltd has detected an anomalous login and a suspicious invoice email. Investigate email headers, login activity, and network logs to identify the attacker.",
                durationMinutes: 10,
                suspects: {
                    finance: { label: "Finance Manager", email: "finance_manager@fintrust.com" },
                    hr: { label: "HR Intern", email: "hr_temp@fintrust.com" },
                    it: { label: "IT Administrator", email: "sysadmin@fintrust.com" }
                },
                evidenceImpact: {
                    fake_invoice: { finance: 40, hr: 10, it: 0 },
                    foreign_ip: { finance: 40, hr: 0, it: 20 },
                    tor_exit: { finance: 10, hr: 0, it: 30 }
                },
                attackTypes: [
                    { id: "brute-force", label: "Brute Force" },
                    { id: "phishing", label: "Phishing" },
                    { id: "malware", label: "Malware Infection" },
                    { id: "insider", label: "Insider Threat" }
                ],
                entryPoints: [
                    { id: "unpatched_server", label: "Unpatched Server" },
                    { id: "fake_invoice", label: "Fake Invoice Email" },
                    { id: "usb_drive", label: "Malicious USB Drive" },
                    { id: "vpn_vuln", label: "VPN Vulnerability" }
                ],
                containmentActions: [
                    { id: "disable", label: "Disable compromised account" },
                    { id: "block", label: "Block malicious IP" },
                    { id: "reset", label: "Reset passwords" },
                    { id: "mfa", label: "Enable MFA" }
                ],
                solution: {
                    attackType: "phishing",
                    entryPoint: "fake_invoice",
                    compromisedAccount: "finance",
                    containment: ["disable", "block", "reset", "mfa"]
                },
                successMessage: "Threat Neutralized – Phishing Campaign Stopped",
                failureMessage: "Investigation Failed – Attacker retains access to financial systems"
            },
            "2": {
                id: "2",
                title: "The Silent Insider",
                briefing: "⚠ CASE BRIEFING: HealthSync Labs has detected suspicious outbound traffic over the past two weeks. Sensitive patient records appear to be leaving the organization — but no malware or external breach has been detected. The CEO suspects an insider threat.",
                durationMinutes: 10,
                suspects: {
                    dba: { label: "Database Administrator", email: "dba@healthsync.com" },
                    marketing: { label: "Marketing Executive", email: "marketing@healthsync.com" },
                    contractor: { label: "Temporary Contractor", email: "contractor@healthsync.com" },
                    it_support: { label: "Remote IT Support Engineer", email: "itsupport@healthsync.com" }
                },
                evidenceImpact: {
                    activity_logs: { contractor: 45, dba: 5, marketing: 0, it_support: 5 },
                    file_access: { contractor: 10, dba: 45, marketing: 5, it_support: 5 },
                    network_logs: { contractor: 45, dba: 5, marketing: 5, it_support: 10 }
                },
                attackTypes: [
                    { id: "malware", label: "Malware Attack" },
                    { id: "phishing", label: "Phishing" },
                    { id: "insider_theft", label: "Insider Data Theft" },
                    { id: "network_breach", label: "Network Breach" }
                ],
                entryPoints: [],   // hidden for EP2
                containmentActions: [
                    { id: "revoke_access", label: "Revoke contractor access immediately" },
                    { id: "audit_transfers", label: "Audit recent file transfers" },
                    { id: "investigate_usb", label: "Investigate USB usage logs" },
                    { id: "enable_dlp", label: "Enable Data Loss Prevention monitoring" }
                ],
                solution: {
                    attackType: "insider_theft",
                    entryPoint: "none",
                    compromisedAccount: "contractor",
                    containment: ["revoke_access", "audit_transfers", "investigate_usb", "enable_dlp"]
                },
                successMessage: "Threat Identified – Insider Data Exfiltration Stopped",
                failureMessage: "Investigation Failed – Insider activity continues undetected"
            }
        };

        // ── EVIDENCE CARDS HTML ─────────────────────────────────────────
        const EVIDENCE_HTML = {
            "1": `
      <div class="evidence-card" draggable="true" data-type="email" data-evidence="fake_invoice">
        <div class="evidence-icon"><i data-lucide="mail"></i></div>
        <div class="evidence-content">
          <h4>Email Logs</h4>
          <p><strong>Sender:</strong> billing@micr0soft-support.com</p>
          <p><strong>Subject:</strong> Urgent Invoice Payment Required</p>
          <p><strong>Attachment:</strong> <span class="highlight-danger">invoice_update.pdf.exe</span></p>
        </div>
      </div>
      <div class="evidence-card" draggable="true" data-type="login" data-evidence="foreign_ip">
        <div class="evidence-icon"><i data-lucide="log-in"></i></div>
        <div class="evidence-content">
          <h4>Login Logs</h4>
          <p><span class="highlight-warning">3:02 AM</span> login from foreign IP</p>
          <p>Multiple failed login attempts</p>
          <p><strong>Account:</strong> finance_manager@fintrust.com</p>
        </div>
      </div>
      <div class="evidence-card" draggable="true" data-type="network" data-evidence="tor_exit">
        <div class="evidence-icon"><i data-lucide="activity"></i></div>
        <div class="evidence-content">
          <h4>Network Logs</h4>
          <p>Encrypted outbound traffic</p>
          <p>Connection to <span class="highlight-danger">TOR exit node</span></p>
        </div>
      </div>`,

            "2": `
      <div class="evidence-card" draggable="true" data-type="login" data-evidence="activity_logs">
        <div class="evidence-icon"><i data-lucide="user-check"></i></div>
        <div class="evidence-content">
          <h4>Login &amp; Activity Logs</h4>
          <p><span class="highlight-warning">After-hours</span> system access from internal workstation</p>
          <p><span class="highlight-warning">Repeated USB device insertions</span> detected</p>
          <p>Large patient data folder accessed <strong>multiple times</strong></p>
        </div>
      </div>
      <div class="evidence-card" draggable="true" data-type="network" data-evidence="file_access">
        <div class="evidence-icon"><i data-lucide="file-search"></i></div>
        <div class="evidence-content">
          <h4>File Access Logs</h4>
          <p>Access to <span class="highlight-danger">restricted patient database</span> directories</p>
          <p>Multiple <strong>file copy operations</strong> recorded</p>
          <p>No security alerts triggered</p>
        </div>
      </div>
      <div class="evidence-card" draggable="true" data-type="email" data-evidence="network_logs">
        <div class="evidence-icon"><i data-lucide="cloud-upload"></i></div>
        <div class="evidence-content">
          <h4>Network Logs</h4>
          <p><span class="highlight-danger">Dropbox upload</span> traffic detected</p>
          <p>Personal <span class="highlight-danger">Gmail forwarding</span> activity found</p>
        </div>
      </div>`
        };

        // ── GAME STATE ──────────────────────────────────────────────────
        let episodeConfig = null;
        let suspicionMeters = {};
        let droppedIds = new Set();
        let timerInterval = null;
        let timeRemaining = 0;
        let gameActive = false;

        // ── INIT ────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', function () {
            lucide.createIcons();

            const urlParams = new URLSearchParams(window.location.search);
            const epId = urlParams.get('ep') || '1';

            episodeConfig = EPISODE_DATA[epId];
            if (!episodeConfig) {
                document.getElementById('ep-title').textContent = 'Episode not found!';
                return;
            }

            initEpisode();
            initDragDrop();
            initButtons();
            initStars();
        });

        function initEpisode() {
            const cfg = episodeConfig;

            // Title
            document.getElementById('ep-title').textContent = `Episode ${cfg.id}: ${cfg.title}`;
            document.title = `Threat Detective – Ep${cfg.id}: ${cfg.title}`;

            // Briefing banner
            document.getElementById('briefing-banner').textContent = cfg.briefing;

            // Evidence cards
            document.getElementById('evidence-list').innerHTML = EVIDENCE_HTML[cfg.id] || '';

            // Suspects
            suspicionMeters = {};
            const sl = document.getElementById('suspects-list');
            sl.innerHTML = '';
            Object.entries(cfg.suspects).forEach(function ([key, info]) {
                suspicionMeters[key] = 0;
                sl.innerHTML += `
          <div class="suspect-card" data-suspect="${key}" id="card-${key}">
            <div class="suspect-profile">
              <div class="avatar"><i data-lucide="user"></i></div>
              <div class="suspect-info">
                <h4>${info.label}</h4>
                <span>${info.email}</span>
              </div>
            </div>
            <div class="meter-container">
              <div class="meter-label">Suspicion Level&nbsp;<span id="meter-pct-${key}">0%</span></div>
              <div class="meter-bar"><div class="meter-fill" id="meter-${key}" style="width:0%"></div></div>
            </div>
          </div>`;
            });

            // Attack types
            const at = document.getElementById('attack-type');
            at.innerHTML = '<option value="">-- Select Threat Type --</option>';
            cfg.attackTypes.forEach(function (t) {
                at.innerHTML += `<option value="${t.id}">${t.label}</option>`;
            });

            // Entry point group
            const epGroup = document.getElementById('entry-point-group');
            const epSel = document.getElementById('entry-point');
            if (cfg.entryPoints && cfg.entryPoints.length > 0) {
                epGroup.style.display = '';
                epSel.innerHTML = '<option value="">-- Select Entry Point --</option>';
                cfg.entryPoints.forEach(function (e) {
                    epSel.innerHTML += `<option value="${e.id}">${e.label}</option>`;
                });
            } else {
                epGroup.style.display = 'none';
                epSel.innerHTML = '<option value="none">N/A</option>';
            }

            // Responsible account
            const ca = document.getElementById('compromised-account');
            ca.innerHTML = '<option value="">-- Select Account --</option>';
            Object.entries(cfg.suspects).forEach(function ([key, info]) {
                ca.innerHTML += `<option value="${key}">${info.label}</option>`;
            });

            // Containment checkboxes
            const cg = document.getElementById('checkbox-grid');
            cg.innerHTML = '';
            cfg.containmentActions.forEach(function (action) {
                cg.innerHTML += `
          <label class="cyber-checkbox">
            <input type="checkbox" id="action-${action.id}" value="${action.id}">
            ${action.label}
          </label>`;
            });

            // Timer
            timeRemaining = cfg.durationMinutes * 60;
            updateTimerDisplay();
            startTimer();

            gameActive = true;
            lucide.createIcons();
            showNotification(`System Initialized. Episode ${cfg.id} investigation started.`, 'info');
        }

        // ── DRAG AND DROP ───────────────────────────────────────────────
        function initDragDrop() {
            const evidenceList = document.getElementById('evidence-list');
            const dropzone = document.getElementById('dropzone');
            const placeholder = document.getElementById('drop-placeholder');
            const board = document.getElementById('board-grid');

            // Attach drag listeners to evidence cards (use delegation)
            evidenceList.addEventListener('dragstart', function (e) {
                const card = e.target.closest('.evidence-card');
                if (!card) return;
                e.dataTransfer.setData('evidence-id', card.dataset.evidence);
                e.dataTransfer.setData('evidence-html', card.outerHTML);
                card.style.opacity = '0.5';
            });
            evidenceList.addEventListener('dragend', function (e) {
                const card = e.target.closest('.evidence-card');
                if (card) card.style.opacity = '1';
            });

            dropzone.addEventListener('dragover', function (e) {
                e.preventDefault();
                placeholder.classList.add('drag-over');
            });
            dropzone.addEventListener('dragleave', function () {
                placeholder.classList.remove('drag-over');
            });
            dropzone.addEventListener('drop', function (e) {
                e.preventDefault();
                placeholder.classList.remove('drag-over');

                const evidenceId = e.dataTransfer.getData('evidence-id');
                const evidenceHtml = e.dataTransfer.getData('evidence-html');

                if (!evidenceId || droppedIds.has(evidenceId)) return;
                droppedIds.add(evidenceId);

                // Add dropped card to board
                const el = document.createElement('div');
                el.className = 'dropped-evidence';
                el.style.width = '240px';
                el.innerHTML = evidenceHtml;
                board.appendChild(el);

                // Glow flash
                el.style.boxShadow = '0 0 20px var(--success)';
                setTimeout(function () { el.style.boxShadow = ''; }, 2000);

                // Update suspicion meters
                const impact = episodeConfig.evidenceImpact[evidenceId];
                if (impact) {
                    Object.entries(impact).forEach(function ([suspect, pts]) {
                        if (suspicionMeters[suspect] !== undefined) {
                            suspicionMeters[suspect] = Math.min(100, suspicionMeters[suspect] + pts);
                            updateMeter(suspect);
                            if (suspicionMeters[suspect] >= 75) {
                                const card = document.getElementById('card-' + suspect);
                                if (card && !card.classList.contains('suspect-high')) {
                                    card.classList.add('suspect-high');
                                    showNotification('⚠ High suspicion: ' + episodeConfig.suspects[suspect].label, 'error');
                                }
                            }
                        }
                    });
                }

                const label = evidenceId.replace(/_/g, ' ');
                showNotification('Evidence analyzed: ' + label.toUpperCase(), 'info');
                lucide.createIcons();
            });
        }

        function updateMeter(suspect) {
            const pct = suspicionMeters[suspect];
            const bar = document.getElementById('meter-' + suspect);
            const text = document.getElementById('meter-pct-' + suspect);
            if (bar) bar.style.width = pct + '%';
            if (text) text.textContent = pct + '%';
        }

        // ── TIMER ───────────────────────────────────────────────────────
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function () {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateTimerDisplay();
                    if (timeRemaining === 300) {   // 5 min warning
                        const disp = document.getElementById('timer-display');
                        if (disp) {
                            disp.style.color = 'var(--secondary)';
                            disp.parentElement.style.borderColor = 'var(--secondary)';
                            disp.parentElement.style.boxShadow = '0 0 10px rgba(255,0,60,.5)';
                        }
                        showNotification('⚠ WARNING: 5 minutes remaining!', 'error');
                    }
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    handleTimeout();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            const el = document.getElementById('timer-display');
            if (el) el.textContent = `00:${m}:${s}`;
        }

        function handleTimeout() {
            gameActive = false;
            const msg = episodeConfig.failureMessage || 'The threat actor escaped before you could stop them.';
            showModal('failure', '⏰ TIME EXPIRED',
                `<p style="color:var(--secondary)"><strong>&gt; OUTCOME: CRITICAL FAILURE</strong></p><br><p>${msg}</p>`);
        }

        // ── BUTTONS ─────────────────────────────────────────────────────
        function initButtons() {
            document.getElementById('submit-investigation').addEventListener('click', submitInvestigation);
            document.getElementById('close-modal').addEventListener('click', function () {
                window.location.href = 'index.html';
            });

            const fsBtn = document.getElementById('fullscreen-toggle');
            if (fsBtn) {
                fsBtn.addEventListener('click', function () {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                });
            }
        }

        function submitInvestigation() {
            if (!gameActive) return;

            const cfg = episodeConfig;

            const attackType = document.getElementById('attack-type').value;
            const entryPointRaw = document.getElementById('entry-point').value;
            const entryPoint = (cfg.entryPoints && cfg.entryPoints.length > 0) ? entryPointRaw : 'none';
            const compromisedAccount = document.getElementById('compromised-account').value;
            const containment = [];

            document.querySelectorAll('#checkbox-grid input[type="checkbox"]:checked').forEach(function (cb) {
                containment.push(cb.value);
            });

            const needsEntryPoint = cfg.entryPoints && cfg.entryPoints.length > 0;
            if (!attackType || !compromisedAccount || (needsEntryPoint && !entryPointRaw)) {
                showNotification('⚠ Please complete all fields before submitting!', 'error');
                return;
            }

            // Stop timer
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            gameActive = false;

            // Evaluate
            const sol = cfg.solution;
            let score = 100;
            let success = true;
            let fb = [];

            if (attackType !== sol.attackType) {
                score -= 20;
                success = false;
                fb.push('✗ Incorrect threat type. This was a <strong>' + getLabel(cfg.attackTypes, sol.attackType) + '</strong>.');
            }
            if (needsEntryPoint && entryPoint !== sol.entryPoint) {
                score -= 15;
                success = false;
                fb.push('✗ Wrong entry vector identified.');
            }
            if (compromisedAccount !== sol.compromisedAccount) {
                score -= 25;
                success = false;
                fb.push('✗ Wrong suspect. The perpetrator was <strong>' + cfg.suspects[sol.compromisedAccount].label + '</strong>.');
            }
            sol.containment.forEach(function (a) {
                if (!containment.includes(a)) {
                    score -= 5;
                    success = false;
                    fb.push('✗ Missed containment action: ' + getLabel(cfg.containmentActions, a));
                }
            });
            containment.forEach(function (a) {
                if (!sol.containment.includes(a)) {
                    score -= 3;
                    fb.push('⚠ Unnecessary containment action: ' + getLabel(cfg.containmentActions, a));
                }
            });

            // Time bonus
            if (success && timeRemaining > 0) score += Math.floor(timeRemaining * 0.05);
            score = Math.max(0, Math.min(100, Math.floor(score)));

            let rank = 'Rookie';
            if (score >= 90) rank = '🏅 Elite Analyst';
            else if (score >= 75) rank = '🥈 Senior Investigator';
            else if (score >= 50) rank = '🥉 Junior Analyst';

            // Result
            if (success) {
                const msg = cfg.successMessage || 'Threat successfully contained!';
                
                // Save completion status to local storage
                localStorage.setItem('episode_' + cfg.id + '_completed', 'true');

                const html = `
          <p style="color:var(--success)"><strong>&gt; OUTCOME: SUCCESS ✓</strong></p><br>
          <p>🎉 ${msg}</p><br>
          <p>Final Score: <strong>${score} / 100</strong></p>
          <p>Assigned Rank: <strong>${rank}</strong></p>`;
                showModal('success', '🛡 Threat Neutralized', html);
            } else {
                const msg = cfg.failureMessage || 'Investigation failed.';
                let html = `<p style="color:var(--secondary)"><strong>&gt; OUTCOME: FAILURE ✗</strong></p><br>`;
                html += `<p>${msg}</p><br>`;
                fb.forEach(function (f) { html += `<p>${f}</p>`; });
                html += `<br><p>Final Score: <strong>${score} / 100</strong></p><p>Rank: <strong>${rank}</strong></p>`;
                showModal('failure', '⚠ Investigation Failed', html);
            }
        }

        function getLabel(arr, id) {
            const found = arr.find(function (x) { return x.id === id; });
            return found ? found.label : id;
        }

        // ── MODAL ───────────────────────────────────────────────────────
        function showModal(type, title, content) {
            const modal = document.getElementById('result-modal');
            const mc = document.getElementById('modal-content');
            document.getElementById('result-title').innerHTML = title;
            document.getElementById('result-text').innerHTML = content;
            mc.className = 'modal-content ' + type;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        // ── NOTIFICATIONS ────────────────────────────────────────────────
        function showNotification(msg, type) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.style.background = type === 'error' ? 'rgba(255,0,60,.92)' : 'rgba(0,240,255,.92)';
            toast.style.color = type === 'error' ? '#fff' : '#000';
            toast.style.padding = '10px 18px';
            toast.style.borderRadius = '4px';
            toast.style.fontFamily = 'monospace';
            toast.style.fontSize = '.85rem';
            toast.style.boxShadow = '0 0 12px ' + (type === 'error' ? 'rgba(255,0,60,.6)' : 'rgba(0,240,255,.6)');
            toast.style.opacity = '0';
            toast.style.transition = 'opacity .2s';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(function () { toast.style.opacity = '1'; }, 20);
            setTimeout(function () {
                toast.style.opacity = '0';
                setTimeout(function () { toast.remove(); }, 300);
            }, 3500);
        }

        // ── STARS BACKGROUND ────────────────────────────────────────────
        function initStars() {
            const canvas = document.getElementById('cyberStarsCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            const stars = [];
            for (let i = 0; i < 40; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 8 + 5,
                    length: Math.random() * 120 + 40,
                    opacity: Math.random() * .4 + .5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(function (s) {
                    s.x += s.speed;
                    s.y += s.speed;
                    if (s.x > canvas.width + s.length || s.y > canvas.height + s.length) {
                        s.x = Math.random() > .5 ? Math.random() * canvas.width : -s.length;
                        s.y = Math.random() > .5 ? -s.length : Math.random() * canvas.height;
                    }
                    ctx.save();
                    const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.length, s.y - s.length);
                    grad.addColorStop(0, `rgba(0,255,127,${s.opacity})`);
                    grad.addColorStop(1, 'rgba(0,255,127,0)');
                    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.length, s.y - s.length);
                    ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,255,127,${s.opacity})`; ctx.fill();
                    ctx.restore();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
